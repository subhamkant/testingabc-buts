name: Upload Music to GitHub Release (run once)

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release and upload music tracks
        run: |
          gh release delete music-tracks --yes 2>/dev/null || true
          gh release create music-tracks assets/*.mp3 \
            --title "Background Music Tracks" \
            --notes "Background music for Mahabharata bot — do not delete this release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
