name: Mahabharata YouTube Bot

on:
  # Re-enabled 2026-06-14 — Phase 16 cooldown over, Phase 17 hyper-cut +
  # Tier 1.5.g music + recent_topics.json migration all shipped. Daily
  # publishing now targets 6:05-6:10 PM IST publish window — trigger at
  # 5:50 PM IST = 12:20 UTC, render takes ~15 min, upload completes around
  # 6:05-6:10 PM IST = peak Indian commute-home Shorts window.
  #
  # GHA cron drift caveat: GitHub Actions scheduled workflows can be
  # delayed +30-60 min during peak load (never early). Setting cron to
  # 5:50 PM IST means actual fire ranges 5:50-6:50 PM IST → publish lands
  # 6:05-7:05 PM IST. For sharp time targets, use an external cron-ping
  # service (e.g. cron-job.org) calling repository_dispatch API. Not
  # warranted yet — the 6:05-7:05 window still hits the IST evening
  # Shorts feed.
  #
  # History:
  #   2026-06-01: temporary disable for one-off manual trigger
  #   2026-06-03: re-enabled after Phase 11 (commit 5109a06)
  #   2026-06-09: disabled — Phase 16 algorithmic cooldown (5-day pause)
  #   2026-06-13: D6 revival published (8Z1QBrqHNb0, later unlisted)
  #               + Tier 1.5.g music drop + Phase 17 hyper-cut shipped
  #   2026-06-14: re-enabled at 12:10 UTC (5:40 PM IST nominal)
  #   2026-06-14: shifted to 12:20 UTC (5:50 PM IST) per owner target
  #               of 6:05-6:10 PM IST publish landing
  schedule:
    - cron: "20 12 * * *"   # 5:50 PM IST nominal → 6:05-6:10 PM IST publish
  workflow_dispatch:
    inputs:
      target:
        description: "What to generate (hi / en / whatif / krishna)"
        required: true
        default: "hi"
        type: choice
        options:
          - hi
          - en
          - whatif
          - krishna
      episode_number:
        description: "Force episode number in title (e.g. '4' for re-rendering blocked #4). Leave blank for auto."
        required: false
        default: ""
        type: string
      skip_instagram:
        description: "Skip Instagram cross-post (default TRUE per 2026-06-04 directive — flip to false to re-enable IG uploads)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      revival_topic:
        description: "Phase 16 D6 revival render — force a specific Mahabharata topic (leave BLANK for legacy weighted-rotation behavior). Example: 'Karna-Kunti meeting — the moment Kunti reveals she is his mother, secret loyalty and the hidden sin of motherhood'"
        required: false
        default: ""
        type: string
      bake_thumbnail_path:
        description: "Phase 16 D6 forced-frame thumbnail — repo-relative path to a 1080x1920 PNG to prepend as first ~0.8s of the MP4 (becomes the YouTube auto-thumbnail). Leave BLANK to skip."
        required: false
        default: ""
        type: string
      phase18_decoupled:
        description: "Phase 18 (2026-06-16) — decoupled voiceover + anchored B-roll. Flip 'true' to test the new architecture (one flowing voiceover + 8-10 literal-physical B-roll images placed at narration anchor phrases). Default 'false' = legacy Phase 17.b 13-scene hyper-cut path."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ════════════════════════════════════════════════════════════════════════════
# WORKFLOW STRUCTURE
# ════════════════════════════════════════════════════════════════════════════
# Every job has `timeout-minutes: 29` so it fits inside a single 30-min GHA
# slot. To absorb runs that genuinely need longer (Mahabharata's ~80 min slow
# path when AI clips are exhausted), each primary has THREE chained retry
# siblings (retry-1, retry-2, retry-3). Each retry fires only if the prior
# attempt was `failure` or `cancelled` (timeout-cancellation counts as
# `cancelled`, not `failure`) and resumes from the shared checkpoint cache.
#
# Total budget per series: 4 attempts × 29 min = 116 min — covers the slowest
# observed runs with margin while staying under the 30-min-per-attempt cap.
#
# Series → primary job mapping:
#   - Mahabharata + Krishna: generate-and-upload  (cron picks which target)
#   - WhatIf English phase:  whatif-english       (only on 04:00 UTC cron)
#   - WhatIf Hindi phase:    whatif-hindi         (depends on EN succeeding)
#
# All retry jobs in a series share ONE artifact name — pipeline-checkpoint-
# <PIPELINE_RUN_ID> — with `overwrite: true`, so each attempt's partial state
# overwrites the prior and the next attempt resumes from wherever the last
# one left off.

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Mahabharata + Krishna — single-job-family pipeline (4 attempts)
  # ════════════════════════════════════════════════════════════════════════

  generate-and-upload:
    # Skip on the WhatIf cron + on workflow_dispatch with target=whatif.
    if: |
      github.event.schedule != '0 4 * * *' &&
      !(github.event_name == 'workflow_dispatch' && inputs.target == 'whatif')
    runs-on: ubuntu-latest
    timeout-minutes: 29
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pipeline-runner
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          youtube-token-b64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          youtube-client-secrets: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
      - name: Determine target + PIPELINE_RUN_ID
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "TARGET=krishna" >> $GITHUB_ENV
          else
            echo "TARGET=hi" >> $GITHUB_ENV
          fi
          # Resolve series for the cache key — both 'hi' and 'en' map to mahabharata.
          T="$TARGET"
          [ -z "$T" ] && T="${{ inputs.target }}"
          SERIES="$T"
          [ "$T" = "hi" ] || [ "$T" = "en" ] && SERIES="mahabharata"
          echo "PIPELINE_RUN_ID=${SERIES}_${{ github.run_id }}" >> $GITHUB_ENV
      # Phase 16 D2 (2026-06-09) — workflow_dispatch revival input handler.
      # When `revival_topic` is provided (the D6 cloud-trigger path), we
      # prepend it to scheduled_topics_mahabharata.txt so the existing
      # forced-topic path picks it up at script-gen time without code
      # changes. When `bake_thumbnail_path` is also set, we export it as
      # BAKE_THUMBNAIL_PATH so main.py's pre-upload bake-in step fires.
      - name: Phase 16 revival overrides (revival_topic + bake_thumbnail_path)
        if: github.event_name == 'workflow_dispatch'
        run: |
          REVIVAL_TOPIC="${{ inputs.revival_topic }}"
          BAKE_PATH="${{ inputs.bake_thumbnail_path }}"
          if [ -n "$REVIVAL_TOPIC" ]; then
            echo "[revival] forcing topic: $REVIVAL_TOPIC"
            # Prepend (not append) so this beats any pre-existing queue entry.
            QUEUE="scheduled_topics_mahabharata.txt"
            TMP_QUEUE="$(mktemp)"
            printf '# Phase 16 D6 revival override (workflow_dispatch %s)\n%s\n' \
              "${{ github.run_id }}" "$REVIVAL_TOPIC" > "$TMP_QUEUE"
            [ -f "$QUEUE" ] && cat "$QUEUE" >> "$TMP_QUEUE"
            mv "$TMP_QUEUE" "$QUEUE"
          fi
          if [ -n "$BAKE_PATH" ]; then
            if [ -f "$BAKE_PATH" ]; then
              echo "[revival] bake-thumbnail enabled: $BAKE_PATH"
              echo "BAKE_THUMBNAIL_PATH=$BAKE_PATH" >> $GITHUB_ENV
            else
              echo "[revival] WARNING: bake_thumbnail_path '$BAKE_PATH' does not exist — skipping bake-in"
            fi
          fi
      - uses: ./.github/actions/run-pipeline-with-checkpoint
        with:
          pipeline-run-id: ${{ env.PIPELINE_RUN_ID }}
          pipeline-cmd: "python main.py ${{ env.TARGET }}"
          commit-message: "Auto-update pipeline state [skip ci]"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-api-key-fallback: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          gemini-api-key-fallback-2: ${{ secrets.GEMINI_API_KEY_FALLBACK_2 }}
          gemini-api-key-fallback-3: ${{ secrets.GEMINI_API_KEY_FALLBACK_3 }}
          instagram-access-token: ${{ secrets.IG_ACCESS_TOKEN }}
          instagram-business-account-id: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          episode-number-override: ${{ inputs.episode_number || '' }}
          skip-instagram: ${{ inputs.skip_instagram || 'true' }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          fal-key: ${{ secrets.FAL_KEY }}
          replicate-api-token: ${{ secrets.REPLICATE_API_TOKEN }}
          hf-token: ${{ secrets.HF_TOKEN }}
          hf-space: ${{ secrets.HF_SPACE }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token-2: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
          cloudflare-account-id-2: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
          cloudflare-api-token-3: ${{ secrets.CLOUDFLARE_API_TOKEN_3 }}
          cloudflare-account-id-3: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_3 }}
          elevenlabs-api-key: ${{ secrets.ELEVENLABS_API_KEY }}
          elevenlabs-api-key-fallback: ${{ secrets.ELEVENLABS_API_KEY_FALLBACK }}
          elevenlabs-voice-id: ${{ secrets.ELEVENLABS_VOICE_ID }}
          elevenlabs-voice-id-krishna: ${{ secrets.ELEVENLABS_VOICE_ID_KRISHNA }}
          phase18-decoupled: ${{ inputs.phase18_decoupled || 'false' }}

  generate-and-upload-retry-1:
    needs: generate-and-upload
    # Fire if primary was cancelled (timeout) OR failed. Skip if it succeeded
    # OR was skipped (cron didn't route here).
    if: |
      always() &&
      contains(fromJson('["failure", "cancelled"]'), needs.generate-and-upload.result)
    runs-on: ubuntu-latest
    timeout-minutes: 29
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pipeline-runner
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          youtube-token-b64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          youtube-client-secrets: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
      - name: Determine target + PIPELINE_RUN_ID (same as primary)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "TARGET=krishna" >> $GITHUB_ENV
          else
            echo "TARGET=hi" >> $GITHUB_ENV
          fi
          T="$TARGET"
          [ -z "$T" ] && T="${{ inputs.target }}"
          SERIES="$T"
          [ "$T" = "hi" ] || [ "$T" = "en" ] && SERIES="mahabharata"
          echo "PIPELINE_RUN_ID=${SERIES}_${{ github.run_id }}" >> $GITHUB_ENV
      - uses: ./.github/actions/run-pipeline-with-checkpoint
        with:
          pipeline-run-id: ${{ env.PIPELINE_RUN_ID }}
          pipeline-cmd: "python main.py ${{ env.TARGET }}"
          commit-message: "Auto-update pipeline state (retry-1) [skip ci]"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-api-key-fallback: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          gemini-api-key-fallback-2: ${{ secrets.GEMINI_API_KEY_FALLBACK_2 }}
          gemini-api-key-fallback-3: ${{ secrets.GEMINI_API_KEY_FALLBACK_3 }}
          instagram-access-token: ${{ secrets.IG_ACCESS_TOKEN }}
          instagram-business-account-id: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          episode-number-override: ${{ inputs.episode_number || '' }}
          skip-instagram: ${{ inputs.skip_instagram || 'true' }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          fal-key: ${{ secrets.FAL_KEY }}
          replicate-api-token: ${{ secrets.REPLICATE_API_TOKEN }}
          hf-token: ${{ secrets.HF_TOKEN }}
          hf-space: ${{ secrets.HF_SPACE }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token-2: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
          cloudflare-account-id-2: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
          cloudflare-api-token-3: ${{ secrets.CLOUDFLARE_API_TOKEN_3 }}
          cloudflare-account-id-3: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_3 }}
          elevenlabs-api-key: ${{ secrets.ELEVENLABS_API_KEY }}
          elevenlabs-api-key-fallback: ${{ secrets.ELEVENLABS_API_KEY_FALLBACK }}
          elevenlabs-voice-id: ${{ secrets.ELEVENLABS_VOICE_ID }}
          elevenlabs-voice-id-krishna: ${{ secrets.ELEVENLABS_VOICE_ID_KRISHNA }}
          phase18-decoupled: ${{ inputs.phase18_decoupled || 'false' }}

  generate-and-upload-retry-2:
    needs: generate-and-upload-retry-1
    if: |
      always() &&
      contains(fromJson('["failure", "cancelled"]'), needs.generate-and-upload-retry-1.result)
    runs-on: ubuntu-latest
    timeout-minutes: 29
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pipeline-runner
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          youtube-token-b64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          youtube-client-secrets: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
      - name: Determine target + PIPELINE_RUN_ID (same as primary)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "TARGET=krishna" >> $GITHUB_ENV
          else
            echo "TARGET=hi" >> $GITHUB_ENV
          fi
          T="$TARGET"
          [ -z "$T" ] && T="${{ inputs.target }}"
          SERIES="$T"
          [ "$T" = "hi" ] || [ "$T" = "en" ] && SERIES="mahabharata"
          echo "PIPELINE_RUN_ID=${SERIES}_${{ github.run_id }}" >> $GITHUB_ENV
      - uses: ./.github/actions/run-pipeline-with-checkpoint
        with:
          pipeline-run-id: ${{ env.PIPELINE_RUN_ID }}
          pipeline-cmd: "python main.py ${{ env.TARGET }}"
          commit-message: "Auto-update pipeline state (retry-2) [skip ci]"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-api-key-fallback: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          gemini-api-key-fallback-2: ${{ secrets.GEMINI_API_KEY_FALLBACK_2 }}
          gemini-api-key-fallback-3: ${{ secrets.GEMINI_API_KEY_FALLBACK_3 }}
          instagram-access-token: ${{ secrets.IG_ACCESS_TOKEN }}
          instagram-business-account-id: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          episode-number-override: ${{ inputs.episode_number || '' }}
          skip-instagram: ${{ inputs.skip_instagram || 'true' }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          fal-key: ${{ secrets.FAL_KEY }}
          replicate-api-token: ${{ secrets.REPLICATE_API_TOKEN }}
          hf-token: ${{ secrets.HF_TOKEN }}
          hf-space: ${{ secrets.HF_SPACE }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token-2: ${{ secrets.CLOUDFLARE_API_TOKEN_2 }}
          cloudflare-account-id-2: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_2 }}
          cloudflare-api-token-3: ${{ secrets.CLOUDFLARE_API_TOKEN_3 }}
          cloudflare-account-id-3: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_3 }}
          elevenlabs-api-key: ${{ secrets.ELEVENLABS_API_KEY }}
          elevenlabs-api-key-fallback: ${{ secrets.ELEVENLABS_API_KEY_FALLBACK }}
          elevenlabs-voice-id: ${{ secrets.ELEVENLABS_VOICE_ID }}
          elevenlabs-voice-id-krishna: ${{ secrets.ELEVENLABS_VOICE_ID_KRISHNA }}
          phase18-decoupled: ${{ inputs.phase18_decoupled || 'false' }}

  generate-and-upload-retry-3:
