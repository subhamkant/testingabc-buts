name: Mahabharata YouTube Bot

on:
  schedule:
    # ── Mahabharata Hindi — 3x/day (4th slot is now Krishna direct address) ──
    # Run 1 -> 12:30 AM IST (19:00 UTC previous day)
    - cron: "0 19 * * *"
    # Run 2 ->  6:30 AM IST (01:00 UTC)
    - cron: "0 1 * * *"
    # Run 3 -> 12:30 PM IST (07:00 UTC)
    - cron: "0 7 * * *"
    # ── Krishna direct-address — 1x/day (replaces former Mahabharata slot 4) ──
    # Run 4 ->  6:30 PM IST (13:00 UTC) — first-person Krishna speech (Hindi)
    - cron: "0 13 * * *"
    # ── What If dual-language — 1x/day (= 2 uploads, fits 10k API quota) ──
    # Run 5 ->  9:30 AM IST (04:00 UTC) — generates HI + EN sharing visuals
    - cron: "0 4 * * *"

  workflow_dispatch:
    inputs:
      target:
        description: "What to generate (hi / en / whatif / krishna)"
        required: true
        default: "hi"
        type: choice
        options:
          - hi
          - en
          - whatif
          - krishna

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pipeline runner (deps, FFmpeg, fonts, music, OAuth)
        uses: ./.github/actions/setup-pipeline-runner
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          youtube-token-b64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          youtube-client-secrets: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}

      - name: Determine target for this run
        run: |
          # Manual dispatch: use the chosen target.
          # Scheduled: route by cron expression —
          #   04:00 UTC = whatif (dual-language)
          #   13:00 UTC = krishna (first-person direct address)
          #   others    = hi (standard Mahabharata)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "TARGET=whatif" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "TARGET=krishna" >> $GITHUB_ENV
          else
            echo "TARGET=hi" >> $GITHUB_ENV
          fi

      - name: Set PIPELINE_RUN_ID
        run: |
          # Deterministic per-workflow-run id used by CheckpointStore. Both the
          # original job and the auto-retry job (which lives in the same
          # workflow run) compute the same value because github.run_id is
          # shared across jobs in one workflow run. This is what lets the
          # retry job find and resume the original's checkpoints.
          SERIES="$TARGET"
          if [ "$TARGET" = "hi" ] || [ "$TARGET" = "en" ]; then
            SERIES="mahabharata"
          fi
          echo "PIPELINE_RUN_ID=${SERIES}_${{ github.run_id }}" >> $GITHUB_ENV

      - name: Restore checkpoint from prior attempt (if any)
        # Only the auto-retry job will find this artifact (uploaded by the
        # original job on failure). On the first attempt this step downloads
        # nothing — the action's `if-no-files-found` default handles cleanly.
        uses: actions/download-artifact@v4
        with:
          name: pipeline-checkpoint-${{ env.PIPELINE_RUN_ID }}
          path: cache/
        continue-on-error: true

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # ElevenLabs is the first tier of the TTS cascade — when set, every
          # video uses the premium voice (dramatically more human than Edge or
          # Charon). Free tier gives ~10k chars/month (~5-7 videos). Falls back
          # silently to Gemini Charon → Edge TTS if the secret is empty.
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_FALLBACK: ${{ secrets.ELEVENLABS_API_KEY_FALLBACK }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          # Per-series voice override for Krishna direct-address videos. When
          # set, the 13:00 UTC slot uses this voice (e.g. a deep / divine
          # ElevenLabs voice). Falls back to ELEVENLABS_VOICE_ID if empty.
          ELEVENLABS_VOICE_ID_KRISHNA: ${{ secrets.ELEVENLABS_VOICE_ID_KRISHNA }}
          NARRATOR_VOICE: Charon
          CINEMATIC_FPS: "30"
          # CheckpointStore reads this to scope cache/<run_id>/ — same value
          # is computed identically by the auto-retry job so it resumes from
          # the original job's checkpoints.
          PIPELINE_RUN_ID: ${{ env.PIPELINE_RUN_ID }}
        run: python main.py ${{ env.TARGET }} 2>&1 | tee pipeline_output.txt

      - name: Save checkpoint cache (always — even on failure)
        # Uploaded regardless of pipeline success or failure so the retry job
        # can resume from whichever step the original got to. On a clean
        # success the artifact is harmless (just unused); 7-day retention
        # keeps storage bounded.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-checkpoint-${{ env.PIPELINE_RUN_ID }}
          path: cache/${{ env.PIPELINE_RUN_ID }}/
          retention-days: 7
          if-no-files-found: ignore

      # Email notifications disabled temporarily — re-enable after fixing MAIL_PASSWORD
      # - name: Send success email
      #   if: success()
      #   uses: dawidd6/action-send-mail@v3
      #   ...

      # - name: Send failure email
      #   if: failure()
      #   uses: dawidd6/action-send-mail@v3
      #   ...

      - name: Commit updated state (characters + topic queues)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          # Pull latest first to avoid push conflicts when multiple cron runs
          # finish close together (Mahabharata 4×/day + Krishna + WhatIf).
          git pull --rebase --autostash origin master || true
          # Stage all rotating-state files. characters.json gets newly-detected
          # character visuals appended; scheduled_topics_*.txt has the consumed
          # topic line removed from the queue (and may have LLM-replenished
          # topics appended); recent_topics.json grows with the just-uploaded
          # topic so future runs avoid duplicates within the ~2-month window.
          # Without committing these back, every workflow run starts from a
          # fresh checkout and the avoidance/queue state is lost.
          git add assets/characters.json scheduled_topics_*.txt recent_topics.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Auto-update pipeline state [skip ci]"
            git push
          fi

      - name: Save refreshed token (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-refresh
          path: token.pickle
          retention-days: 1

  # ─── Auto-retry-once on failure ─────────────────────────────────────────────
  # Fires immediately if generate-and-upload fails. Downloads the checkpoint
  # artifact saved by the original job and re-invokes main.py — the pipeline
  # then resumes from the last completed step thanks to CheckpointStore.
  # If THIS retry also fails the run dies and the user re-triggers manually
  # from the GHA UI. Intentional design: prevents infinite retry loops on
  # persistent issues (e.g. revoked API key) and bounds GHA minute spend.
  generate-and-upload-retry:
    needs: generate-and-upload
    if: failure() && needs.generate-and-upload.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pipeline runner (deps, FFmpeg, fonts, music, OAuth)
        uses: ./.github/actions/setup-pipeline-runner
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          youtube-token-b64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
          youtube-client-secrets: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}

      - name: Determine target for this run (same logic as primary job)
        run: |
          # Identical to the primary job — both must compute the same TARGET
          # so they hit the same CheckpointStore directory.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "TARGET=whatif" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "TARGET=krishna" >> $GITHUB_ENV
          else
            echo "TARGET=hi" >> $GITHUB_ENV
          fi

      - name: Set PIPELINE_RUN_ID (same as primary job)
        run: |
          SERIES="$TARGET"
          if [ "$TARGET" = "hi" ] || [ "$TARGET" = "en" ]; then
            SERIES="mahabharata"
          fi
          echo "PIPELINE_RUN_ID=${SERIES}_${{ github.run_id }}" >> $GITHUB_ENV

      - name: Download checkpoint from primary job
        # Required for resume — if no artifact exists the retry has nothing to
        # resume from and would just redo the failed run from scratch (a waste
        # of GHA minutes). Hard-fail if missing.
        uses: actions/download-artifact@v4
        with:
          name: pipeline-checkpoint-${{ env.PIPELINE_RUN_ID }}
          path: cache/${{ env.PIPELINE_RUN_ID }}/

      - name: Resume pipeline from checkpoint
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_FALLBACK: ${{ secrets.ELEVENLABS_API_KEY_FALLBACK }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_VOICE_ID_KRISHNA: ${{ secrets.ELEVENLABS_VOICE_ID_KRISHNA }}
          NARRATOR_VOICE: Charon
          CINEMATIC_FPS: "30"
          PIPELINE_RUN_ID: ${{ env.PIPELINE_RUN_ID }}
        run: python main.py ${{ env.TARGET }} 2>&1 | tee pipeline_output.txt

      - name: Save updated checkpoint cache (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-checkpoint-${{ env.PIPELINE_RUN_ID }}-retry
          path: cache/${{ env.PIPELINE_RUN_ID }}/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit updated state (characters + topic queues)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase --autostash origin master || true
          git add assets/characters.json scheduled_topics_*.txt recent_topics.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Auto-update pipeline state (retry) [skip ci]"
            git push
          fi
