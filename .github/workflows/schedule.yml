name: Mahabharata YouTube Bot

on:
  schedule:
    # All runs in Hindi — 4x per day (IST times)
    # Run 1 -> 12:30 AM IST (19:00 UTC previous day)
    - cron: "0 19 * * *"
    # Run 2 ->  6:30 AM IST (01:00 UTC)
    - cron: "0 1 * * *"
    # Run 3 -> 12:30 PM IST (07:00 UTC)
    - cron: "0 7 * * *"
    # Run 4 ->  6:30 PM IST (13:00 UTC)
    - cron: "0 13 * * *"

  workflow_dispatch:
    inputs:
      language:
        description: "Language to generate (en / hi)"
        required: true
        default: "hi"
        type: choice
        options:
          - hi
          - en

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Music is stored in a GitHub Release and cached — not in the repo
      - name: Restore music cache
        id: music-cache
        uses: actions/cache@v4
        with:
          path: assets/music
          key: music-tracks-v1

      - name: Download music from GitHub Release
        if: steps.music-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p assets/music
          gh release download music-tracks --dir assets/music --pattern "*.mp3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ubuntu-latest already has FFmpeg — no install needed

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube auth token
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle

      - name: Restore client_secrets.json
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Determine language for this run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "LANG=${{ inputs.language }}" >> $GITHUB_ENV
          else
            echo "LANG=hi" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py ${{ env.LANG }} 2>&1 | tee pipeline_output.txt

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Vyasa AI] Video uploaded successfully"
          to: subhamkant.11@gmail.com
          from: Vyasa AI Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Your Mahabharata bot just uploaded a new video!

            Run: #${{ github.run_number }}
            Repo: ${{ github.repository }}

            --- Pipeline log ---
          attachments: pipeline_output.txt

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Vyasa AI] Pipeline FAILED - Run #${{ github.run_number }}"
          to: subhamkant.11@gmail.com
          from: Vyasa AI Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            The Mahabharata bot pipeline failed.

            Run: #${{ github.run_number }}
            Repo: ${{ github.repository }}
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            --- Last output ---
          attachments: pipeline_output.txt

      - name: Commit updated characters.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add assets/characters.json
          if git diff --staged --quiet; then
            echo "No new characters detected."
          else
            git commit -m "Auto-update characters.json [skip ci]"
            git push
          fi

      - name: Save refreshed token (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-refresh
          path: token.pickle
          retention-days: 1
