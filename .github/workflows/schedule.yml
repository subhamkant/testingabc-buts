name: Mahabharata YouTube Bot

on:
  schedule:
    # ── Mahabharata Hindi — 3x/day (4th slot is now Krishna direct address) ──
    # Run 1 -> 12:30 AM IST (19:00 UTC previous day)
    - cron: "0 19 * * *"
    # Run 2 ->  6:30 AM IST (01:00 UTC)
    - cron: "0 1 * * *"
    # Run 3 -> 12:30 PM IST (07:00 UTC)
    - cron: "0 7 * * *"
    # ── Krishna direct-address — 1x/day (replaces former Mahabharata slot 4) ──
    # Run 4 ->  6:30 PM IST (13:00 UTC) — first-person Krishna speech (Hindi)
    - cron: "0 13 * * *"
    # ── What If dual-language — 1x/day (= 2 uploads, fits 10k API quota) ──
    # Run 5 ->  9:30 AM IST (04:00 UTC) — generates HI + EN sharing visuals
    - cron: "0 4 * * *"

  workflow_dispatch:
    inputs:
      target:
        description: "What to generate (hi / en / whatif / krishna)"
        required: true
        default: "hi"
        type: choice
        options:
          - hi
          - en
          - whatif
          - krishna

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore music cache
        id: music-cache
        uses: actions/cache@v4
        with:
          path: assets/music
          key: music-tracks-v2

      - name: Download music from GitHub Release
        if: steps.music-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p assets/music
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/music-tracks" \
            | python3 -c "
          import sys, json, urllib.request, os
          TOKEN = '${{ secrets.GITHUB_TOKEN }}'
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          print(f'Found {len(assets)} music files')
          for a in assets:
              api_url = a['url']
              name = a['name']
              print(f'Downloading {name}...')
              req = urllib.request.Request(api_url, headers={
                  'Authorization': f'token {TOKEN}',
                  'Accept': 'application/octet-stream'
              })
              with urllib.request.urlopen(req) as r, open(f'assets/music/{name}', 'wb') as f:
                  f.write(r.read())
          "

      - name: Restore cinematic assets cache (LUTs + overlays)
        id: cinematic-cache
        uses: actions/cache@v4
        with:
          path: |
            assets/luts
            assets/overlays
          key: cinematic-assets-v1

      - name: Download cinematic assets from GitHub Release
        if: steps.cinematic-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p assets/luts assets/overlays/lightleaks assets/overlays/lensflares
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/cinematic-assets" \
            | python3 -c "
          import sys, json, urllib.request, os
          TOKEN = '${{ secrets.GITHUB_TOKEN }}'
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          print(f'Found {len(assets)} cinematic asset files')
          for a in assets:
              name = a['name']
              # Route by extension/name into the right subdir
              if name.endswith('.cube'):
                  dest = f'assets/luts/{name}'
              elif 'lensflare' in name.lower() or 'flare' in name.lower():
                  dest = f'assets/overlays/lensflares/{name}'
              else:
                  dest = f'assets/overlays/lightleaks/{name}'
              print(f'Downloading {name} -> {dest}')
              req = urllib.request.Request(a['url'], headers={
                  'Authorization': f'token {TOKEN}',
                  'Accept': 'application/octet-stream'
              })
              with urllib.request.urlopen(req) as r, open(dest, 'wb') as f:
                  f.write(r.read())
          " || true
          # Always run the asset bootstrapper so synthetic LUTs/overlays exist
          # even if no GitHub Release was uploaded yet
          python download_assets.py || true

      - name: Install FFmpeg + Devanagari font
        # fonts-noto-* gives us Devanagari + Latin coverage for burned-in
        # subtitles. libass picks them up automatically from system fontconfig.
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-cjk \
            fonts-indic fonts-deva
          fc-cache -f -v

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ubuntu-latest already has FFmpeg — no install needed

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube auth token
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle

      - name: Restore client_secrets.json
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Determine target for this run
        run: |
          # Manual dispatch: use the chosen target.
          # Scheduled: route by cron expression —
          #   04:00 UTC = whatif (dual-language)
          #   13:00 UTC = krishna (first-person direct address)
          #   others    = hi (standard Mahabharata)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "TARGET=whatif" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
            echo "TARGET=krishna" >> $GITHUB_ENV
          else
            echo "TARGET=hi" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # ElevenLabs is the first tier of the TTS cascade — when set, every
          # video uses the premium voice (dramatically more human than Edge or
          # Charon). Free tier gives ~10k chars/month (~5-7 videos). Falls back
          # silently to Gemini Charon → Edge TTS if the secret is empty.
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_API_KEY_FALLBACK: ${{ secrets.ELEVENLABS_API_KEY_FALLBACK }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          # Per-series voice override for Krishna direct-address videos. When
          # set, the 13:00 UTC slot uses this voice (e.g. a deep / divine
          # ElevenLabs voice). Falls back to ELEVENLABS_VOICE_ID if empty.
          ELEVENLABS_VOICE_ID_KRISHNA: ${{ secrets.ELEVENLABS_VOICE_ID_KRISHNA }}
          NARRATOR_VOICE: Charon
          CINEMATIC_FPS: "30"
        run: python main.py ${{ env.TARGET }} 2>&1 | tee pipeline_output.txt

      # Email notifications disabled temporarily — re-enable after fixing MAIL_PASSWORD
      # - name: Send success email
      #   if: success()
      #   uses: dawidd6/action-send-mail@v3
      #   ...

      # - name: Send failure email
      #   if: failure()
      #   uses: dawidd6/action-send-mail@v3
      #   ...

      - name: Commit updated state (characters + topic queues)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          # Pull latest first to avoid push conflicts when multiple cron runs
          # finish close together (Mahabharata 4×/day + Krishna + WhatIf).
          git pull --rebase --autostash origin master || true
          # Stage all rotating-state files. characters.json gets newly-detected
          # character visuals appended; scheduled_topics_*.txt has the consumed
          # topic line removed from the queue (and may have LLM-replenished
          # topics appended); recent_topics.json grows with the just-uploaded
          # topic so future runs avoid duplicates within the ~2-month window.
          # Without committing these back, every workflow run starts from a
          # fresh checkout and the avoidance/queue state is lost.
          git add assets/characters.json scheduled_topics_*.txt recent_topics.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Auto-update pipeline state [skip ci]"
            git push
          fi

      - name: Save refreshed token (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-refresh
          path: token.pickle
          retention-days: 1
