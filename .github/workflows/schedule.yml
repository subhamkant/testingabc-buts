name: Mahabharata YouTube Bot

on:
  schedule:
    # All runs in Hindi — 4x per day (IST times)
    # Run 1 -> 12:30 AM IST (19:00 UTC previous day)
    - cron: "0 19 * * *"
    # Run 2 ->  6:30 AM IST (01:00 UTC)
    - cron: "0 1 * * *"
    # Run 3 -> 12:30 PM IST (07:00 UTC)
    - cron: "0 7 * * *"
    # Run 4 ->  6:30 PM IST (13:00 UTC)
    - cron: "0 13 * * *"

  # Manual trigger with language choice
  workflow_dispatch:
    inputs:
      language:
        description: "Language to generate (en / hi)"
        required: true
        default: "hi"
        type: choice
        options:
          - hi
          - en

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube auth token
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle

      - name: Restore client_secrets.json
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Determine language for this run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "LANG=${{ inputs.language }}" >> $GITHUB_ENV
          else
            echo "LANG=hi" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py ${{ env.LANG }}

      - name: Save refreshed token (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-refresh
          path: token.pickle
          retention-days: 1
