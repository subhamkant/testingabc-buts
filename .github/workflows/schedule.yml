name: Mahabharata YouTube Bot

on:
  schedule:
    # All runs in Hindi — 4x per day (IST times)
    # Run 1 -> 12:30 AM IST (19:00 UTC previous day)
    - cron: "0 19 * * *"
    # Run 2 ->  6:30 AM IST (01:00 UTC)
    - cron: "0 1 * * *"
    # Run 3 -> 12:30 PM IST (07:00 UTC)
    - cron: "0 7 * * *"
    # Run 4 ->  6:30 PM IST (13:00 UTC)
    - cron: "0 13 * * *"

  workflow_dispatch:
    inputs:
      language:
        description: "Language to generate (en / hi)"
        required: true
        default: "hi"
        type: choice
        options:
          - hi
          - en

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore music cache
        id: music-cache
        uses: actions/cache@v4
        with:
          path: assets/music
          key: music-tracks-v1

      - name: Download music from GitHub Release
        if: steps.music-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p assets/music
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/music-tracks" \
            | python3 -c "
          import sys, json, urllib.request, os
          TOKEN = '${{ secrets.GITHUB_TOKEN }}'
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          print(f'Found {len(assets)} music files')
          for a in assets:
              api_url = a['url']
              name = a['name']
              print(f'Downloading {name}...')
              req = urllib.request.Request(api_url, headers={
                  'Authorization': f'token {TOKEN}',
                  'Accept': 'application/octet-stream'
              })
              with urllib.request.urlopen(req) as r, open(f'assets/music/{name}', 'wb') as f:
                  f.write(r.read())
          "

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ubuntu-latest already has FFmpeg — no install needed

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore YouTube auth token
        run: echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > token.pickle

      - name: Restore client_secrets.json
        run: echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json

      - name: Determine language for this run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "LANG=${{ inputs.language }}" >> $GITHUB_ENV
          else
            echo "LANG=hi" >> $GITHUB_ENV
          fi

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py ${{ env.LANG }} 2>&1 | tee pipeline_output.txt

      # Email notifications disabled temporarily — re-enable after fixing MAIL_PASSWORD
      # - name: Send success email
      #   if: success()
      #   uses: dawidd6/action-send-mail@v3
      #   ...

      # - name: Send failure email
      #   if: failure()
      #   uses: dawidd6/action-send-mail@v3
      #   ...

      - name: Commit updated characters.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add assets/characters.json
          if git diff --staged --quiet; then
            echo "No new characters detected."
          else
            git commit -m "Auto-update characters.json [skip ci]"
            git push
          fi

      - name: Save refreshed token (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-refresh
          path: token.pickle
          retention-days: 1
