name: Run pipeline with checkpoint resume + commit
description: |
  Composite action used by every pipeline job (primary and chained retries).
  Restores the run's checkpoint cache from the workflow's shared artifact,
  runs main.py, saves the cache back, then commits any updated state files
  (characters.json, scheduled_topics_*.txt, recent_topics.json).

  All retry jobs reuse this — the only difference between attempts is the
  `pipeline-cmd` input (always the same per series) and the chained `needs:`/
  `if:` wiring in the calling job. The artifact name is identical across all
  attempts within a workflow run, with `overwrite: true` so each attempt's
  partial progress lands in cache for the next attempt to resume from.

inputs:
  pipeline-run-id:
    required: true
    description: "Shared cache key — same across primary + all retry jobs in this workflow run."
  pipeline-cmd:
    required: true
    description: "Shell command to run. e.g. 'python main.py hi' or 'python main.py whatif --lang=en'."
  commit-message:
    required: false
    default: "Auto-update pipeline state [skip ci]"
    description: "Commit message used by the post-run state-commit step."

  # ── secrets passed through ─────────────────────────────────────────────
  github-token:                  { required: true }
  gemini-api-key:                { required: true }
  # Additional Gemini API keys from other Google Cloud projects — cascaded by
  # _gemini_keys() in pipeline/script_generator.py. Each adds 50 RPD of Pro
  # quota. With all 4 keys configured: 200 RPD Pro vs 50 with primary alone,
  # which is critical under the retry-heavy script-gen (Tier 1.5 added hook +
  # rehook + length-bounds hard gates on top of existing tha-tic / engagement /
  # bookend / monotony checks). Optional — defaults to empty so a missing key
  # doesn't fail the workflow; _gemini_keys() filters empties out.
  gemini-api-key-fallback:       { required: false, default: "" }
  gemini-api-key-fallback-2:     { required: false, default: "" }
  gemini-api-key-fallback-3:     { required: false, default: "" }
  # Instagram Reels distribution (added 2026-05-17). Both optional — if
  # absent, the pipeline's IG cross-post step prints "[ig] SKIP" and the
  # YouTube path runs unchanged. See pipeline/instagram_uploader.py +
  # setup_instagram_auth.py for the auth flow.
  instagram-access-token:        { required: false, default: "" }
  instagram-business-account-id: { required: false, default: "" }
  # Optional title-prefix override (e.g. "4" to re-render a blocked episode
  # with its original number). Empty = use the auto-computed number from
  # arc-pick or recent_topics len+1 fallback.
  episode-number-override:       { required: false, default: "" }
  # Optional Instagram skip — when "true", main.py logs "[ig] SKIPPED" and
  # the IG cross-post is bypassed even when video_id is present. Useful
  # for re-rendering an episode that's already on IG, or for YT-only runs.
  skip-instagram:                { required: false, default: "false" }
  groq-api-key:                  { required: true }
  fal-key:                       { required: true }
  replicate-api-token:           { required: true }
  hf-token:                      { required: true }
  hf-space:                      { required: true }
  cloudflare-api-token:          { required: true }
  cloudflare-account-id:         { required: true }
  # Additional Cloudflare Workers AI accounts — cascaded by _gen_cloudflare
  # in pipeline/image_generator.py. Optional; if unset the cascade still
  # works with whatever accounts ARE configured. 3 accounts = ~6 clean
  # videos/day capacity vs ~2 on a single account (10k neurons each).
  cloudflare-api-token-2:        { required: false, default: "" }
  cloudflare-account-id-2:       { required: false, default: "" }
  cloudflare-api-token-3:        { required: false, default: "" }
  cloudflare-account-id-3:       { required: false, default: "" }
  elevenlabs-api-key:            { required: true }
  elevenlabs-api-key-fallback:   { required: true }
  elevenlabs-voice-id:           { required: true }
  elevenlabs-voice-id-krishna:   { required: true }
  # Phase 18 (2026-06-16) — Decoupled voiceover + anchored B-roll opt-in.
  # Default "false" so the cron continues to ship Phase 17.b until smoke
  # confirms. Flip to "true" via workflow_dispatch input to test live.
  phase18-decoupled:             { required: false, default: "false" }
  # Kill-switch (added 2026-06-25) — when "true", main.py exits immediately
  # without running ANY pipeline work. Survives the chained-retry siblings
  # (every retry reads the same env-var, so all attempts no-op cleanly).
  # Use this for fast pause during audits / hotfix windows without disabling
  # the workflow file. Default "false" = pipeline runs normally.
  pause-pipeline:                { required: false, default: "false" }

runs:
  using: composite
  steps:
    - name: Restore checkpoint cache (no-op on first attempt)
      uses: actions/download-artifact@v4
      with:
        name: pipeline-checkpoint-${{ inputs.pipeline-run-id }}
        path: cache/${{ inputs.pipeline-run-id }}/
      continue-on-error: true

    - name: Run pipeline (resumes from cache if any)
      shell: bash
      env:
        GEMINI_API_KEY:                ${{ inputs.gemini-api-key }}
        GEMINI_API_KEY_FALLBACK:       ${{ inputs.gemini-api-key-fallback }}
        GEMINI_API_KEY_FALLBACK_2:     ${{ inputs.gemini-api-key-fallback-2 }}
        GEMINI_API_KEY_FALLBACK_3:     ${{ inputs.gemini-api-key-fallback-3 }}
        IG_ACCESS_TOKEN:               ${{ inputs.instagram-access-token }}
        IG_BUSINESS_ACCOUNT_ID:        ${{ inputs.instagram-business-account-id }}
        # GITHUB_TOKEN is needed by pipeline/instagram_uploader.py to upload
        # the mp4 to the `instagram-staging` GitHub Release so the Graph API
        # can fetch the video_url. Without this export the IG cross-post
        # fails with "no GitHub token found" while the YT path still works.
        GITHUB_TOKEN:                  ${{ inputs.github-token }}
        EPISODE_NUMBER_OVERRIDE:       ${{ inputs.episode-number-override }}
        SKIP_INSTAGRAM:                ${{ inputs.skip-instagram }}
        GROQ_API_KEY:                  ${{ inputs.groq-api-key }}
        FAL_KEY:                       ${{ inputs.fal-key }}
        REPLICATE_API_TOKEN:           ${{ inputs.replicate-api-token }}
        HF_TOKEN:                      ${{ inputs.hf-token }}
        HF_SPACE:                      ${{ inputs.hf-space }}
        CLOUDFLARE_API_TOKEN:          ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID:         ${{ inputs.cloudflare-account-id }}
        CLOUDFLARE_API_TOKEN_2:        ${{ inputs.cloudflare-api-token-2 }}
        CLOUDFLARE_ACCOUNT_ID_2:       ${{ inputs.cloudflare-account-id-2 }}
        CLOUDFLARE_API_TOKEN_3:        ${{ inputs.cloudflare-api-token-3 }}
        CLOUDFLARE_ACCOUNT_ID_3:       ${{ inputs.cloudflare-account-id-3 }}
        ELEVENLABS_API_KEY:            ${{ inputs.elevenlabs-api-key }}
        ELEVENLABS_API_KEY_FALLBACK:   ${{ inputs.elevenlabs-api-key-fallback }}
        ELEVENLABS_VOICE_ID:           ${{ inputs.elevenlabs-voice-id }}
        ELEVENLABS_VOICE_ID_KRISHNA:   ${{ inputs.elevenlabs-voice-id-krishna }}
        NARRATOR_VOICE: Charon
        CINEMATIC_FPS: "30"
        # Per-provider I2V timeout — drops a flaky free-tier provider sooner
        # so the per-scene cascade falls to Ken Burns within ~120s.
        CLIP_PROVIDER_TIMEOUT: "120"
        # WhatIf EN-phase hold — skip the English TTS/assembly/subtitles/upload.
        # The EN phase still generates the shared script + visuals (which the
        # HI phase needs to consume). HI upload proceeds normally.
        # To restore EN uploads: set this to "false" or remove the line.
        WHATIF_SKIP_EN_UPLOAD: "true"
        PIPELINE_RUN_ID: ${{ inputs.pipeline-run-id }}
        # Phase 18 (2026-06-16) — opt-in decoupled voiceover + broll path.
        # See pipeline/phase18.py + main.py shim. Default "false".
        PHASE18_DECOUPLED: ${{ inputs.phase18-decoupled }}
        # Kill-switch (2026-06-25) — when "true", main.py exits before any
        # work begins. Survives chained-retry siblings.
        PAUSE_PIPELINE: ${{ inputs.pause-pipeline }}
      run: ${{ inputs.pipeline-cmd }} 2>&1 | tee pipeline_output.txt

    - name: Persist unsaved assembled video to checkpoint (cancellation race)
      # Cancellation race: if Step 4 produced output/video_*.mp4 but Python
      # was SIGKILL'd before ck.save_file("video_pre_subs.mp4") completed,
      # the next retry would re-assemble from scratch — and if image
      # providers are 429-storming during retry, it produces a video full
      # of black placeholders. This step copies any output/*.mp4 into the
      # cache under the right checkpoint key BEFORE upload-artifact runs,
      # so the cache that retries restore from already has the finished
      # video. `if: always()` => runs even after Python step gets
      # cancelled or timed out.
      if: always()
      shell: bash
      run: |
        mkdir -p "cache/${{ inputs.pipeline-run-id }}"
        shopt -s nullglob
        copied=0
        for f in output/video_*.mp4; do
          base=$(basename "$f")
          # Map output filename → cache key by series prefix
          if [[ "$base" == video_whatif_en_* ]]; then
            dest="cache/${{ inputs.pipeline-run-id }}/video_pre_subs_en.mp4"
          elif [[ "$base" == video_whatif_hi_* ]]; then
            dest="cache/${{ inputs.pipeline-run-id }}/video_pre_subs_hi.mp4"
          else
            # Mahabharata (video_hi_*) and Krishna (video_krishna_hi_*) both
            # use the unprefixed video_pre_subs.mp4 cache key
            dest="cache/${{ inputs.pipeline-run-id }}/video_pre_subs.mp4"
          fi
          # Only copy if cache doesn't already have a same-or-newer file
          if [[ ! -f "$dest" ]] || [[ "$f" -nt "$dest" ]]; then
            cp -f "$f" "$dest"
            copied=$((copied+1))
            echo "  Persisted $base -> $(basename $dest)"
          fi
        done
        echo "Defensive cache save: $copied file(s) copied."

    - name: Save checkpoint cache (always — even on timeout / failure)
      # Same artifact name across primary + all retries so each attempt's
      # progress overwrites the previous. The next chained retry's restore
      # step picks up the latest partial state.
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-checkpoint-${{ inputs.pipeline-run-id }}
        path: cache/${{ inputs.pipeline-run-id }}/
        retention-days: 7
        if-no-files-found: ignore
        overwrite: true

    - name: Commit updated state (characters + topic queues)
      if: always()
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://x-access-token:${{ inputs.github-token }}@github.com/${{ github.repository }}.git
        # Pull latest first to avoid push conflicts when multiple cron runs
        # finish close together.
        git pull --rebase --autostash origin master || true
        git add assets/characters.json scheduled_topics_*.txt recent_topics.json 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "No state changes to commit."
        else
          git commit -m "${{ inputs.commit-message }}"
          git push
        fi
